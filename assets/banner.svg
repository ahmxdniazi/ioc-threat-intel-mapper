<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f"/>
      <stop offset="50%" style="stop-color:#0f1f3d"/>
      <stop offset="100%" style="stop-color:#07111f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="200" cy="160" rx="300" ry="150" fill="#7dd3fc" opacity="0.04" filter="url(#blur)"/>
  <ellipse cx="1100" cy="160" rx="250" ry="120" fill="#fbbf24" opacity="0.05" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#1a2a4a" stroke-width="1" opacity="0.6">
    <line x1="0" y1="53" x2="1280" y2="53"/>
    <line x1="0" y1="106" x2="1280" y2="106"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="213" x2="1280" y2="213"/>
    <line x1="0" y1="266" x2="1280" y2="266"/>
    <line x1="128" y1="0" x2="128" y2="320"/>
    <line x1="256" y1="0" x2="256" y2="320"/>
    <line x1="384" y1="0" x2="384" y2="320"/>
    <line x1="512" y1="0" x2="512" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="768" y1="0" x2="768" y2="320"/>
    <line x1="896" y1="0" x2="896" y2="320"/>
    <line x1="1024" y1="0" x2="1024" y2="320"/>
    <line x1="1152" y1="0" x2="1152" y2="320"/>
  </g>

  <!-- Accent top bar -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- Left side: shield icon area -->
  <g transform="translate(80, 90)">
    <!-- Outer hex -->
    <polygon points="70,0 140,40 140,120 70,160 0,120 0,40" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.3"/>
    <!-- Inner hex -->
    <polygon points="70,20 120,48 120,112 70,140 20,112 20,48" fill="none" stroke="#7dd3fc" stroke-width="1" opacity="0.2"/>
    <!-- Shield -->
    <path d="M70,35 L100,50 L100,95 Q100,120 70,130 Q40,120 40,95 L40,50 Z" fill="none" stroke="#7dd3fc" stroke-width="2" opacity="0.8"/>
    <!-- Checkmark in shield -->
    <polyline points="55,82 66,93 88,68" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Orbit dots -->
    <circle cx="0" cy="80" r="4" fill="#7dd3fc" opacity="0.6"/>
    <circle cx="140" cy="80" r="4" fill="#fbbf24" opacity="0.6"/>
    <circle cx="70" cy="0" r="3" fill="#7dd3fc" opacity="0.4"/>
    <circle cx="70" cy="160" r="3" fill="#fbbf24" opacity="0.4"/>
  </g>

  <!-- Main title -->
  <text x="270" y="118" font-family="'Courier New', monospace" font-size="42" font-weight="700" fill="url(#accent)">IOC Threat Intel Mapper</text>

  <!-- Subtitle -->
  <text x="272" y="158" font-family="'Courier New', monospace" font-size="17" fill="#b7c3df" letter-spacing="2">Automated IOC Extraction · VirusTotal Enrichment · HTML Reporting</text>

  <!-- Accent line -->
  <rect x="270" y="172" width="680" height="2" fill="url(#accent)" opacity="0.5" rx="1"/>

  <!-- Tags -->
  <g transform="translate(272, 192)">
    <!-- Tag 1 -->
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#1a2a4a" stroke="#7dd3fc" stroke-width="1" opacity="0.8"/>
    <text x="55" y="19" font-family="Arial" font-size="12" fill="#7dd3fc" text-anchor="middle">🐍 Python</text>
    <!-- Tag 2 -->
    <rect x="120" y="0" width="150" height="28" rx="14" fill="#1a2a4a" stroke="#fbbf24" stroke-width="1" opacity="0.8"/>
    <text x="195" y="19" font-family="Arial" font-size="12" fill="#fbbf24" text-anchor="middle">🔎 Threat Intel</text>
    <!-- Tag 3 -->
    <rect x="280" y="0" width="160" height="28" rx="14" fill="#1a2a4a" stroke="#34d399" stroke-width="1" opacity="0.8"/>
    <text x="360" y="19" font-family="Arial" font-size="12" fill="#34d399" text-anchor="middle">🛡️ Malware Analysis</text>
    <!-- Tag 4 -->
    <rect x="450" y="0" width="150" height="28" rx="14" fill="#1a2a4a" stroke="#a78bfa" stroke-width="1" opacity="0.8"/>
    <text x="525" y="19" font-family="Arial" font-size="12" fill="#a78bfa" text-anchor="middle">📊 VirusTotal API</text>
    <!-- Tag 5 -->
    <rect x="610" y="0" width="110" height="28" rx="14" fill="#1a2a4a" stroke="#fb7185" stroke-width="1" opacity="0.8"/>
    <text x="665" y="19" font-family="Arial" font-size="12" fill="#fb7185" text-anchor="middle">🔴 SOC Ready</text>
  </g>

  <!-- Right side stats panel -->
  <g transform="translate(980, 60)">
    <rect width="240" height="200" rx="16" fill="#0d1830" stroke="#263252" stroke-width="1"/>
    <rect width="240" height="3" rx="1" fill="url(#accent)" y="0"/>
    <!-- Stat 1 -->
    <text x="120" y="50" font-family="'Courier New', monospace" font-size="32" font-weight="700" fill="#ff4d4d" text-anchor="middle">18</text>
    <text x="120" y="70" font-family="Arial" font-size="12" fill="#b7c3df" text-anchor="middle">IOCs Extracted</text>
    <!-- Divider -->
    <line x1="20" y1="85" x2="220" y2="85" stroke="#263252" stroke-width="1"/>
    <!-- Stat 2 -->
    <text x="80" y="122" font-family="'Courier New', monospace" font-size="26" font-weight="700" fill="#34d399" text-anchor="middle">5/5</text>
    <text x="80" y="140" font-family="Arial" font-size="11" fill="#b7c3df" text-anchor="middle">Confirmed</text>
    <!-- Divider vertical -->
    <line x1="140" y1="92" x2="140" y2="155" stroke="#263252" stroke-width="1"/>
    <!-- Stat 3 -->
    <text x="190" y="122" font-family="'Courier New', monospace" font-size="26" font-weight="700" fill="#fb7185" text-anchor="middle">60</text>
    <text x="190" y="140" font-family="Arial" font-size="11" fill="#b7c3df" text-anchor="middle">Max Detections</text>
    <!-- Divider -->
    <line x1="20" y1="158" x2="220" y2="158" stroke="#263252" stroke-width="1"/>
    <!-- Source -->
    <text x="120" y="182" font-family="Arial" font-size="11" fill="#7dd3fc" text-anchor="middle">Source: Akira Ransomware</text>
    <text x="120" y="197" font-family="Arial" font-size="10" fill="#b7c3df" text-anchor="middle">Unit42 · Palo Alto Networks</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="308" width="1280" height="12" fill="url(#glow)"/>
  <rect x="0" y="317" width="1280" height="3" fill="url(#accent)" opacity="0.3"/>

  <!-- Author tag bottom left -->
  <text x="20" y="308" font-family="'Courier New', monospace" font-size="11" fill="#4a6080">Muhammad Ahmad · MS Cybersecurity · SOC | Threat Intelligence | Cloud Security</text>
</svg>
